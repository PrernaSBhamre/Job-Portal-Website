<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Corporate Profile | Tools and Job</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: #0c0c0e;
            --border: #1d1d21;
            --violet: #8b5cf6;
            --violet-hover: #7c3aed;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --tp: #ffffff;
            --ts: #71717a;
        }

        body {
            background-color: var(--bg);
            color: var(--tp);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background-image: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.05), transparent 50%);
        }

        /* Deep Ambient Glows */
        .glow-1 { position: absolute; top: -10%; left: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(139, 92, 246, 0.06), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); pointer-events: none; }
        .glow-2 { position: absolute; bottom: 10%; right: -5%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139, 92, 246, 0.04), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); pointer-events: none; }

        /* Navbar styling */
        .navbar-wrapper {
            border-bottom: 1px solid var(--border);
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-custom { padding: 18px 0; display: flex; align-items: center; justify-content: space-between; }
        
        .logo-box { display: flex; align-items: center; gap: 12px; text-decoration: none; transition: 0.3s; }
        .logo-icon { 
            width: 40px; height: 40px; 
            background: var(--violet); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; font-weight: 900; font-size: 1.2rem; 
            transform: rotate(-3deg);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }
        .logo-box:hover { transform: scale(1.05); }
        .logo-text { font-weight: 800; font-size: 1.5rem; color: #fff; letter-spacing: -0.8px; }
        .logo-text span { color: var(--violet); }

        .nav-pill { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 4px; 
            display: flex; gap: 4px; 
        }
        .nav-pill a { 
            color: var(--zinc-500); 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600; 
            padding: 8px 20px; 
            border-radius: 12px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-pill a:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
        .nav-pill a.active { color: #fff; background: var(--violet); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2); }

        .profile-container { padding: 60px 0; position: relative; z-index: 10; max-width: 1000px; margin: 0 auto; }
        
        .profile-header {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 30px;
            position: relative;
            overflow: hidden;
        }
        .profile-header::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 200px; height: 200px;
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.1), transparent 70%);
            pointer-events: none;
        }

        .large-avatar {
            width: 100px;
            height: 100px;
            background: var(--violet);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3);
            border: 3px solid rgba(255,255,255,0.05);
        }

        .header-content h1 { font-size: 2rem; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .header-content p { color: var(--zinc-400); font-weight: 500; margin-bottom: 12px; }
        
        .h-badge { 
            background: rgba(139, 92, 246, 0.1); 
            border: 1px solid rgba(139, 92, 246, 0.2); 
            padding: 4px 14px; 
            border-radius: 30px; 
            font-size: 0.75rem; 
            font-weight: 700; 
            color: var(--violet); 
            width: fit-content;
        }

        .panel { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 45px; 
            margin-bottom: 30px; 
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-title { font-weight: 800; font-size: 1.4rem; margin-bottom: 30px; color: #fff; display: flex; align-items: center; gap: 12px; }
        .section-title i { color: var(--violet); }

        .form-group label { font-size: 0.75rem; font-weight: 700; color: var(--zinc-500); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; display: block; }
        .form-control { 
            background: #09090b !important; 
            border: 1px solid var(--border) !important; 
            color: white !important; 
            border-radius: 12px; 
            padding: 14px 16px; 
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        .form-control:focus { border-color: var(--violet) !important; box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1) !important; }

        .btn-submit { 
            background: var(--violet); 
            color: white; border: none; 
            padding: 16px 40px; border-radius: 14px; 
            font-weight: 700; transition: all 0.3s; 
            box-shadow: 0 4px 0 0 #6d28d9; width: 100%;
        }
        .btn-submit:hover { background: var(--violet-hover); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3); }

        .comp-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        .comp-logo { 
            width: 64px; height: 64px; 
            background: var(--border); 
            border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 800; font-size: 1.5rem; color: var(--violet);
        }

        @media (max-width: 768px) {
            .profile-header { flex-direction: column; text-align: center; }
            .panel { padding: 30px 20px; }
        }
    </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Navbar -->
  <div class="navbar-wrapper">
    <div class="container">
      <nav class="navbar-custom">
        <a href="../../index.html" class="logo-box">
          <div class="logo-icon">T</div>
          <div class="logo-text">Tools<span>&Job</span></div>
        </a>
        <div class="nav-pill d-none d-md-flex">
          <a href="../../index.html">Home</a>
          <a href="../jobs/jobs.html">Find Jobs</a>
          <a href="../services/services.html">Services</a>
          <a href="../resources/resources.html">Resources</a>
          <a href="dashboard.html">Dashboard</a>
        </div>
        <div class="auth-btns" id="navbarAuth"></div>
      </nav>
    </div>
  </div>

  <div class="container profile-container">
      <div class="profile-header">
          <div class="large-avatar" id="avatarBox">??</div>
          <div class="header-content">
              <h1 id="displayName">Recruiter Profile</h1>
              <p id="displayBio">Senior Talent Acquisition Partner</p>
              <div class="h-badge"><i class="bi bi-shield-check me-1"></i> Authorized Employer</div>
          </div>
      </div>

      <div class="row">
          <div class="col-lg-6">
              <div class="panel h-100">
                  <h2 class="section-title"><i class="bi bi-person-badge"></i> Personal Credentials</h2>
                  <form id="recruiterForm">
                      <div class="mb-4 form-group">
                          <label>Full Legal Name</label>
                          <input type="text" id="rName" class="form-control" placeholder="Johnathan Doe" required>
                      </div>
                      <div class="mb-4 form-group">
                          <label>Professional Designation</label>
                          <input type="text" id="rTitle" class="form-control" placeholder="HR Manager / Tech Recruiter">
                      </div>
                      <div class="mb-4 form-group">
                          <label>Contact Number</label>
                          <input type="text" id="rPhone" class="form-control" placeholder="+91 98765 43210">
                      </div>
                      <button type="submit" class="btn-submit" id="saveRecruiterBtn">Update Identity</button>
                  </form>
              </div>
          </div>
          <div class="col-lg-6">
              <div class="panel h-100">
                  <h2 class="section-title"><i class="bi bi-building"></i> Company Genesis</h2>
                  <form id="companyForm">
                      <div class="mb-4 form-group">
                          <label>Legal Entity Name</label>
                          <input type="text" id="cName" class="form-control" placeholder="Acme Tech Global" required>
                      </div>
                      <div class="mb-4 form-group">
                          <label>Digital Hub (Website)</label>
                          <input type="url" id="cWeb" class="form-control" placeholder="https://acme.tech">
                      </div>
                      <div class="mb-4 form-group">
                          <label>Global Headquarters</label>
                          <input type="text" id="cLoc" class="form-control" placeholder="San Francisco / Bangalore">
                      </div>
                      <button type="submit" class="btn-submit" id="saveCompanyBtn">Establish Brand</button>
                  </form>
              </div>
          </div>
          <div class="col-12 mt-4">
              <div class="panel">
                  <h2 class="section-title"><i class="bi bi-card-text"></i> Corporate Narrative</h2>
                  <div class="form-group">
                      <label>Mission Statement & Culture</label>
                      <textarea id="cDesc" class="form-control" rows="5" placeholder="Detail your company's mission, impact, and talent philosophy..."></textarea>
                  </div>
                  <button type="button" class="btn-submit mt-4" id="saveDescBtn">Synchronize Narrative</button>
              </div>
          </div>
      </div>
  </div>

  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="profile.js"></script>
</body>
</html>
