<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>My Dashboard | Tools and Job</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: #0c0c0e;
            --border: #1d1d21;
            --violet: #8b5cf6;
            --violet-hover: #7c3aed;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --tp: #ffffff;
            --ts: #71717a;
        }

        body {
            background-color: var(--bg);
            color: var(--tp);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            background-image: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.05), transparent 50%);
        }

        /* Deep Ambient Glows */
        .glow-1 { position: absolute; top: -10%; left: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(139, 92, 246, 0.06), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); pointer-events: none; }
        .glow-2 { position: absolute; bottom: 10%; right: -5%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(139, 92, 246, 0.04), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); pointer-events: none; }

        /* Navbar styling */
        .navbar-wrapper {
            border-bottom: 1px solid var(--border);
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-custom { padding: 18px 0; display: flex; align-items: center; justify-content: space-between; }
        
        .logo-box { display: flex; align-items: center; gap: 12px; text-decoration: none; transition: 0.3s; }
        .logo-icon { 
            width: 40px; height: 40px; 
            background: var(--violet); 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; font-weight: 900; font-size: 1.2rem; 
            transform: rotate(-3deg);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
        }
        .logo-box:hover { transform: scale(1.05); }
        .logo-text { font-weight: 800; font-size: 1.5rem; color: #fff; letter-spacing: -0.8px; }
        .logo-text span { color: var(--violet); }

        .nav-pill { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 4px; 
            display: flex; gap: 4px; 
        }
        .nav-pill a { 
            color: var(--zinc-500); 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600; 
            padding: 8px 20px; 
            border-radius: 12px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-pill a:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
        .nav-pill a.active { color: #fff; background: var(--violet); box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2); }

        .dashboard-container { padding: 60px 0; position: relative; z-index: 10; }
        
        .panel { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 45px; 
            margin-bottom: 30px; 
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
            animation: panelFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes panelFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .panel-title { font-weight: 800; font-size: 1.8rem; margin-bottom: 30px; color: #fff; letter-spacing: -0.5px; }

        .nav-tabs { border-bottom: 1px solid var(--border); margin-bottom: 40px; gap: 30px; }
        .nav-tabs .nav-link { 
            background: none; border: none; color: var(--zinc-500); 
            font-weight: 700; padding: 12px 0; 
            border-bottom: 2px solid transparent; 
            cursor: pointer; transition: 0.3s;
            font-size: 0.95rem;
        }
        .nav-tabs .nav-link:hover { color: var(--tp); }
        .nav-tabs .nav-link.active { color: var(--violet); border-bottom-color: var(--violet); }

        .form-group label { font-size: 0.75rem; font-weight: 700; color: var(--zinc-500); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; display: block; }
        .form-control { 
            background: #09090b !important; 
            border: 1px solid var(--border) !important; 
            color: white !important; 
            border-radius: 12px; 
            padding: 14px 16px; 
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        .form-control:focus { 
            border-color: var(--violet) !important; 
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1) !important; 
            background: #111113 !important;
            transform: translateY(-2px);
        }
        .form-control::placeholder { color: #3f3f46; }

        .btn-submit { 
            background: var(--violet); 
            color: white; 
            border: none; 
            padding: 16px 40px; 
            border-radius: 14px; 
            font-weight: 700; 
            transition: all 0.3s; 
            box-shadow: 0 4px 0 0 #6d28d9;
        }
        .btn-submit:hover { 
            background: var(--violet-hover);
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3); 
        }
        .btn-submit:active { transform: translateY(2px); box-shadow: 0 0 0 0 #6d28d9; }

        /* Application Cards */
        .app-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 24px; 
            margin-bottom: 16px; 
            display: flex; justify-content: space-between; align-items: center; 
            transition: 0.3s;
        }
        .app-card:hover { border-color: var(--violet); background: rgba(255,255,255,0.04); transform: translateX(5px); }
        .app-main { display: flex; align-items: center; gap: 18px; }
        .app-icon { width: 44px; height: 44px; background: rgba(255, 255, 255, 0.04); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--violet); font-size: 1.2rem; }
        .app-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 2px; color: #fff; }
        .app-co { font-size: 0.85rem; color: var(--zinc-500); font-weight: 500; }
        
        .app-status { font-size: 0.7rem; font-weight: 800; padding: 6px 14px; border-radius: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .status-pending { background: rgba(249, 115, 22, 0.1); color: #f97316; border: 1px solid rgba(249, 115, 22, 0.2); }
        .status-reviewed { background: rgba(139, 92, 246, 0.1); color: var(--violet); border: 1px solid rgba(139, 92, 246, 0.2); }
        .status-accepted { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }
        .status-rejected { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }

        .current-resume {
            margin-top: 20px; padding: 20px;
            background: rgba(34, 197, 94, 0.05);
            border: 1px solid rgba(34, 197, 94, 0.1);
            border-radius: 16px;
            color: #22c55e;
            display: none; align-items: center; gap: 15px;
        }

        @media (max-width: 768px) {
            .panel { padding: 30px 20px; }
            .navbar-custom { padding: 15px 0; }
            .nav-tabs { overflow-x: auto; white-space: nowrap; gap: 20px; scrollbar-width: none; }
        }
    </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Navbar -->
  <div class="navbar-wrapper">
    <div class="container">
      <nav class="navbar-custom">
        <a href="../../index.html" class="logo-box">
          <div class="logo-icon">T</div>
          <div class="logo-text">Tools<span>&Job</span></div>
        </a>
        <div class="nav-pill d-none d-md-flex">
          <a href="../../index.html">Home</a>
          <a href="../jobs/jobs.html">Find Jobs</a>
          <a href="../services/services.html">Services</a>
          <a href="../resources/resources.html">Resources</a>
          <a href="#" class="active">My Profile</a>
        </div>
        <div class="auth-btns" id="navbarAuth">
          <!-- Auth logic populates this -->
        </div>
      </nav>
    </div>
  </div>

  <div class="container dashboard-container">
      <ul class="nav-tabs d-flex list-unstyled">
          <li class="nav-item">
              <a class="nav-link active" onclick="switchTab('applications', this)">My Applications</a>
          </li>
      </ul>

      <div id="applicationsTab" class="panel">
          <h2 class="panel-title">Applications Hub</h2>
          <div id="myAppsList">
            <!-- Dynamic Injection -->
            <div class="text-center py-5">
              <span class="spinner-border text-violet"></span>
              <p class="mt-3 text-zinc-500">Retrieving active applications...</p>
            </div>
          </div>
      </div>
  </div>

  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
