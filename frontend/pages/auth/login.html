<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tools & Job</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #09090b;
            --card: #0c0c0e;
            --border: #1d1d21;
            --violet: #8b5cf6;
            --violet-hover: #7c3aed;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --tp: #ffffff;
            --ts: #71717a;
        }

        body {
            background: var(--bg);
            color: var(--tp);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 15px 0;
        }

        /* Deep Ambient Glows */
        .glow-1 { position: absolute; top: -15%; left: -10%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(139, 92, 246, 0.08), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); }
        .glow-2 { position: absolute; bottom: -20%; right: -5%; width: 800px; height: 800px; background: radial-gradient(circle, rgba(139, 92, 246, 0.05), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); }

        .auth-container {
            width: 100%;
            max-width: 460px;
            padding: 24px;
            z-index: 10;
        }

        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            animation: formFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--violet), transparent);
            opacity: 0.3;
        }

        @keyframes formFadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-box {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-decoration: none; margin-bottom: 25px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: var(--violet);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 1.5rem;
            transform: rotate(-4deg);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .logo-box:hover .logo-icon { transform: rotate(0deg) scale(1.1); }
        .logo-text { font-weight: 800; font-size: 1.8rem; color: #fff; letter-spacing: -1px; }
        .logo-text span { color: var(--violet); }

        .auth-header { text-align: center; margin-bottom: 25px; }
        .auth-title { font-weight: 800; font-size: 1.7rem; margin-bottom: 6px; letter-spacing: -0.5px; }
        .auth-sub { color: var(--ts); font-size: 0.85rem; font-weight: 500; }

        .form-group { margin-bottom: 16px; position: relative; }
        .form-label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--zinc-500); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i.prefix-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--zinc-500); font-size: 1rem; transition: 0.3s; pointer-events: none; }
        .input-wrapper i.toggle-password { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--zinc-500); cursor: pointer; transition: 0.3s; }
        .input-wrapper i:hover { color: #fff; }
        
        .form-control {
            width: 100%;
            background: #09090b;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 12px 12px 48px;
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-control::placeholder { color: #3f3f46; }
        .form-control:focus {
            background: #111113;
            border-color: var(--violet);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            outline: none;
            transform: translateY(-1px);
        }
        .form-control:focus ~ i.prefix-icon { color: var(--violet); transform: translateY(-50%) scale(1.1); }

        .btn-submit {
            width: 100%;
            background: var(--violet);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 5px;
            box-shadow: 0 4px 0 0 #6d28d9;
        }
        .btn-submit:hover {
            background: var(--violet-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }
        .btn-submit:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 0 #6d28d9;
        }
        .btn-submit:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }

        .auth-footer { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--ts); font-weight: 500; }
        .auth-link { color: var(--violet); font-weight: 700; text-decoration: none; transition: 0.2s; }
        .auth-link:hover { color: #a78bfa; text-decoration: underline; }

        .social-btns { display: flex; gap: 12px; margin-top: 25px; }
        .social-btn { flex: 1; padding: 12px; border-radius: 14px; border: 1px solid var(--border); background: rgba(255,255,255,0.02); color: #fff; font-weight: 600; font-size: 0.9rem; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; text-decoration: none;}
        .social-btn:hover { background: rgba(255,255,255,0.05); border-color: var(--zinc-500); }

        .divider { text-align: center; color: var(--zinc-500); font-size: 0.7rem; font-weight: 700; margin: 15px 0; position: relative; letter-spacing: 1px; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 25%; height: 1px; background: var(--border); }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* Return Home */
        .btn-home { position: absolute; top: 40px; left: 40px; color: var(--ts); text-decoration: none; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; z-index: 20; padding: 8px 16px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid transparent; }
        .btn-home:hover { color: #fff; background: rgba(255,255,255,0.08); border-color: var(--border); }

        #loginMessage { margin-top: 20px; transition: 0.3s; min-height: 24px; }
        .msg-container { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; font-weight: 600; padding: 12px; border-radius: 12px; }
        .msg-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .msg-success { background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2); }

        @media (max-width: 480px) {
            .auth-card { padding: 32px 24px; border-radius: 24px; }
            .btn-home { top: 20px; left: 20px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <a href="../../index.html" class="btn-home"><i class="bi bi-arrow-left"></i> Back to Home</a>

    <div class="auth-container">
        <div class="auth-card">
            <a href="../../index.html" class="logo-box">
                <div class="logo-icon">T</div>
                <div class="logo-text">Tools<span>&Job</span></div>
            </a>

            <div class="auth-header">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-sub">Enter your credentials to access your dashboard</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="loginEmail" class="form-control" placeholder="name@company.com" required>
                        <i class="bi bi-envelope prefix-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Secure Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-lock prefix-icon"></i>
                        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="d-flex justify-content-end mb-3">
                    <a href="forgot-password.html" class="auth-link" style="font-size: 0.8rem; opacity: 0.8; transition: 0.3s;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-submit" id="submitBtn">Login</button>
                <div id="loginMessage"></div>
            </form>

            <div class="divider">OR SIGN IN WITH</div>

            <div class="social-btns">
                <a href="#" class="social-btn" onclick="alert('OAuth integration coming soon!')">
                    <i class="bi bi-github"></i> GitHub
                </a>
                <a href="#" class="social-btn" onclick="alert('OAuth integration coming soon!')">
                    <i class="bi bi-linkedin" style="color:#0a66c2;"></i> LinkedIn
                </a>
            </div>

            <div class="auth-footer">
                New to Tools & Job? <a href="register.html" class="auth-link">Sign Up Now</a>
            </div>
        </div>
    </div>

    <!-- The Auth logic expects config.js and auth.js -->
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        // Password visibility toggle
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#loginPassword');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        document.getElementById("loginForm").addEventListener("submit", async function(e){
            e.preventDefault();
            
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            const msgBox = document.getElementById("loginMessage");
            const btn = document.getElementById("submitBtn");

            if(email === "" || password === ""){
                msgBox.innerHTML = `
                    <div class="msg-container msg-error">
                        <i class="bi bi-exclamation-triangle"></i> Mandatory fields missing
                    </div>
                `;
                return;
            }

            btn.innerHTML = "<span class='spinner-border spinner-border-sm me-2'></span> Verifying...";
            btn.disabled = true;
            msgBox.innerHTML = "";

            try {
                const response = await fetch(`${CONFIG.API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.innerHTML = `
                        <div class="msg-container msg-success">
                            <i class="bi bi-shield-check"></i> Identity Verified! Redirecting...
                        </div>
                    `;
                    
                    // Call the setSession function from auth.js
                    setSession(data, data.token);

                    // Redirect based on role
                    setTimeout(() => {
                        const role = data.role.toLowerCase();
                        if (role === 'admin') {
                            // Still point to admin if applicable, or fallback
                            window.location.href = `http://localhost:5173/?token=${data.token}&role=${data.role}`;
                        }
                        else if (role === 'recruiter') {
                            // LOCAL REDIRECT TO NEW VANILLA JS DASHBOARD
                            window.location.href = "../employer/dashboard.html";
                        }
                        else {
                            // DEFAULT TO SEEKER DASHBOARD
                            window.location.href = "../seeker/dashboard.html";
                        }
                    }, 800);

                } else {
                    // OTP verification check removed (all users auto-verified)

                    msgBox.innerHTML = `
                        <div class="msg-container msg-error">
                            <i class="bi bi-shield-slash"></i> ${data.message || 'Authentication failed'}
                        </div>
                    `;
                    btn.disabled = false;
                    btn.innerHTML = "Login";
                }
            } catch (error) {
                console.error("Connection Error:", error);
                msgBox.innerHTML = `
                    <div class="msg-container msg-error">
                        <i class="bi bi-wifi-off"></i> Platform services unreachable
                    </div>
                `;
                btn.disabled = false;
                btn.innerHTML = "Authenticate Account";
            }
        });
    </script>
</body>
</html>
