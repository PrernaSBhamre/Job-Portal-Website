<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | Tools and Job</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #09090b;
            --card: #0c0c0e;
            --border: #1d1d21;
            --violet: #8b5cf6;
            --violet-hover: #7c3aed;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --tp: #ffffff;
            --ts: #71717a;
        }

        body {
            background: var(--bg);
            color: var(--tp);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 0;
        }

        /* Deep Ambient Glows */
        .glow-1 { position: absolute; top: -15%; left: -10%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(139, 92, 246, 0.08), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); }
        .glow-2 { position: absolute; bottom: -20%; right: -5%; width: 800px; height: 800px; background: radial-gradient(circle, rgba(139, 92, 246, 0.05), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); }

        .auth-container {
            width: 100%;
            max-width: 460px;
            padding: 24px;
            z-index: 10;
        }

        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            animation: formFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--violet), transparent);
            opacity: 0.3;
        }

        @keyframes formFadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-box {
            display: flex; align-items: center; justify-content: center; gap: 16px;
            text-decoration: none; margin-bottom: 40px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: var(--violet);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 1.5rem;
            transform: rotate(-4deg);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .logo-box:hover .logo-icon { transform: rotate(0deg) scale(1.1); }
        .logo-text { font-weight: 800; font-size: 1.8rem; color: #fff; letter-spacing: -1px; }
        .logo-text span { color: var(--violet); }

        .auth-header { text-align: center; margin-bottom: 35px; }
        .auth-title { font-weight: 800; font-size: 1.8rem; margin-bottom: 10px; letter-spacing: -0.5px; }
        .auth-sub { color: var(--ts); font-size: 0.95rem; font-weight: 500; }

        .form-group { margin-bottom: 24px; position: relative; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--zinc-500); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i.prefix-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--zinc-500); font-size: 1.1rem; transition: 0.3s; pointer-events: none; }
        .input-wrapper i.toggle-password { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--zinc-500); cursor: pointer; transition: 0.3s; }
        .input-wrapper i:hover { color: #fff; }
        
        .form-control {
            width: 100%;
            background: #09090b;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px 15px 15px 52px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-control::placeholder { color: #3f3f46; }
        .form-control:focus {
            background: #111113;
            border-color: var(--violet);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            outline: none;
        }
        .form-control:focus ~ i.prefix-icon { color: var(--violet); }

        .btn-submit {
            width: 100%;
            background: var(--violet);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 0 0 #6d28d9;
        }
        .btn-submit:hover {
            background: var(--violet-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }
        .btn-submit:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 0 #6d28d9;
        }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        #resMessage { margin-top: 20px; transition: 0.3s; min-height: 24px; display: none; }
        .msg-container { display: flex; flex-direction: column; align-items: center; border-radius: 16px; padding: 20px; text-align: center; gap: 12px; }
        .msg-success { background: rgba(34, 197, 94, 0.05); border: 1px solid rgba(34, 197, 94, 0.2); color: #22c55e; }
        .msg-error { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; }

        #countdown {
            margin-top: 20px;
            color: var(--zinc-500);
            font-size: 0.9rem;
            font-weight: 600;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        @media (max-width: 480px) {
            .auth-card { padding: 32px 24px; border-radius: 24px; }
        }
    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <a href="../../index.html" class="logo-box">
                <div class="logo-icon">T</div>
                <div class="logo-text">Tools<span>&Job</span></div>
            </a>

            <div class="auth-header">
                <h1 class="auth-title">Security Key Verified</h1>
                <p class="auth-sub">Identity confirmed. Please establish your new secure password below.</p>
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label">New Secure Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-lock prefix-icon"></i>
                        <i class="bi bi-eye-slash toggle-password" data-target="newPassword"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-shield-lock prefix-icon"></i>
                        <i class="bi bi-eye-slash toggle-password" data-target="confirmPassword"></i>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="subBtn">Update & Secure Account</button>
                <div id="resMessage"></div>
            </form>
            
            <div id="countdown" style="display:none;">
                Identity updated. Returning to portal in <span id="secs" style="color:var(--violet);">5</span>s...
            </div>
        </div>
    </div>

    <!-- The Auth logic expects config.js -->
    <script src="../../js/config.js"></script>
    <script>
        // Password toggles
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                input.setAttribute('type', type);
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const msgBox = document.getElementById('resMessage');
            const countdownBox = document.getElementById('countdown');
            
            msgBox.style.display = 'none';
            msgBox.className = '';

            const p1 = document.getElementById('newPassword').value;
            const p2 = document.getElementById('confirmPassword').value;

            if (p1 !== p2) {
                msgBox.className = 'msg-container msg-error';
                msgBox.innerHTML = `<i class="bi bi-exclamation-octagon-fill"></i> Passwords mismatch detected`;
                msgBox.style.display = 'flex';
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                msgBox.className = 'msg-container msg-error';
                msgBox.innerHTML = `<i class="bi bi-shield-x"></i> Security token missing or expired`;
                msgBox.style.display = 'flex';
                return;
            }

            btn.innerHTML = "<span class='spinner-border spinner-border-sm me-2'></span> Updating Records...";
            btn.disabled = true;

            try {
                 const response = await fetch(`${CONFIG.API_URL}/auth/reset-password/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: p1 })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.className = 'msg-container msg-success';
                    msgBox.innerHTML = `
                        <i class="bi bi-shield-check-fill" style="font-size: 2rem;"></i>
                        <div>
                            <div style="font-weight: 800;">Password Synchronized</div>
                            <div style="font-size: 0.85rem;">${data.message || 'Credentials updated successfully'}</div>
                        </div>
                    `;
                    msgBox.style.display = 'flex';
                    
                    countdownBox.style.display = 'block';
                    let s = 5;
                    const iv = setInterval(() => {
                        s--;
                        document.getElementById('secs').innerText = s;
                        if(s <= 0) {
                            clearInterval(iv);
                            window.location.href = 'login.html';
                        }
                    }, 1000);

                } else {
                    msgBox.className = 'msg-container msg-error';
                    msgBox.innerHTML = `
                        <i class="bi bi-shield-slash-fill" style="font-size: 1.5rem;"></i>
                        <div>
                            <div style="font-weight: 800;">Update Blocked</div>
                            <div style="font-size: 0.85rem;">${data.message || 'Security token verification failed.'}</div>
                        </div>
                    `;
                    msgBox.style.display = 'flex';
                    btn.disabled = false;
                    btn.innerHTML = 'Update & Secure Account';
                }
            } catch (error) {
                console.error('Password Reset Error:', error);
                msgBox.className = 'msg-container msg-error';
                msgBox.innerHTML = `
                    <i class="bi bi-wifi-off" style="font-size: 1.1rem;"></i> Network error detected
                `;
                msgBox.style.display = 'flex';
                btn.disabled = false;
                btn.innerHTML = 'Update & Secure Account';
            }
        });
    </script>
</body>
</html>
