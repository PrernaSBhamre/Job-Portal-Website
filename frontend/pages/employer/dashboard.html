<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Employer Dashboard – FresherHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b14;
      --card: #181824;
      --border: #2a2a42;
      --purple: #6d28d9;
      --purple-light: #8b5cf6;
      --orange: #f97316;
      --orange-light: #fb923c;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      background-position: center top;
    }

    .navbar-wrapper {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(11, 11, 20, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar-custom {
      padding: 22px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #5b21b6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 1.1rem;
      box-shadow: 0 0 15px rgba(91, 33, 182, 0.6);
    }

    .logo-text {
      font-weight: 700;
      font-size: 1.35rem;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo-text span {
      color: #8b5cf6;
    }

    .nav-pill {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 40px;
      padding: 6px 8px;
      display: flex;
      gap: 5px;
    }

    .nav-pill a {
      color: #a1a1aa;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 8px 20px;
      border-radius: 30px;
      transition: 0.3s;
    }

    .nav-pill a:hover,
    .nav-pill a.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    .auth-btns {
      display: flex;
      align-items: center;
      gap: 25px;
    }
    
    .dashboard-container {
        padding: 50px 0;
    }

    .panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 30px;
        margin-bottom: 30px;
    }

    .panel-title {
        font-weight: 800;
        font-size: 1.5rem;
        margin-bottom: 20px;
        color: #fff;
    }

    .form-group label {
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 8px;
        display: block;
        font-size: 0.9rem;
    }

    .form-control {
        background: rgba(0,0,0,0.2) !important;
        border: 1px solid var(--border) !important;
        color: white !important;
        border-radius: 10px;
        padding: 12px 15px;
    }

    .form-control:focus {
        border-color: var(--purple-light) !important;
        box-shadow: 0 0 0 0.25rem rgba(139, 92, 246, 0.25) !important;
    }

    .btn-submit {
        background: linear-gradient(135deg, var(--purple), var(--purple-light));
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 10px;
        font-weight: 600;
        transition: 0.3s;
        margin-top: 15px;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(109, 40, 217, 0.3);
    }
    
    .nav-tabs {
        border-bottom: 1px solid var(--border);
        margin-bottom: 25px;
    }
    .nav-tabs .nav-link {
        color: var(--text-muted);
        border: none;
        font-weight: 600;
        padding: 12px 25px;
        border-bottom: 2px solid transparent;
        cursor: pointer;
    }
    .nav-tabs .nav-link.active {
        color: var(--purple-light);
        background: transparent;
        border-bottom: 2px solid var(--purple-light);
    }
    
    .job-list-item {
        background: rgba(0,0,0,0.2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .j-title { font-weight: 700; font-size: 1.1rem; }
    .j-meta { font-size: 0.85rem; color: var(--text-muted); margin-top: 5px; }

    /* Kanban ATS Board */
    .kanban-board { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; min-height: 400px; }
    .kanban-col { min-width: 250px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; }
    .kanban-header { font-weight: 700; margin-bottom: 15px; text-transform: uppercase; font-size: 0.85rem; color: var(--text-muted); letter-spacing: 0.5px; }
    .kanban-card { background: var(--card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; }
    .kanban-card h5 { font-size: 1rem; font-weight: 700; margin: 0 0 5px 0; color: #fff; }
    .kanban-card p { font-size: 0.8rem; color: var(--text-muted); margin: 0 0 10px 0; }
    .action-select { width: 100%; background: #0b0b14; color: white; border: 1px solid var(--purple-light); border-radius: 5px; padding: 6px; font-size: 0.8rem; cursor: pointer; outline: none; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar-wrapper">
    <div class="container">
      <nav class="navbar-custom">
        <a href="../../index.html" class="logo-box">
          <div class="logo-icon">F</div>
          <div class="logo-text">Fresher<span>Hub</span></div>
        </a>
        <div class="nav-pill d-none d-md-flex">
          <a href="../../index.html">Home</a>
          <a href="../jobs/jobs.html">Find Jobs</a>
          <a href="../services/services.html">Services</a>
          <a href="../resources/resources.html">Resources</a>
          <a href="#" class="active mt-1">Employer Dashboard</a>
        </div>
        <div class="auth-btns">
          <!-- Auth logic will populate this -->
        </div>
      </nav>
    </div>
  </div>

  <div class="container dashboard-container">
      <div id="companySetupPanel" class="panel" style="display:none;">
          <h2 class="panel-title">Setup Company Profile</h2>
          <p class="text-muted mb-4">You must create a company profile before posting jobs.</p>
          <form id="companyForm">
              <div class="row">
                  <div class="col-md-6 mb-3 form-group">
                      <label>Company Name</label>
                      <input type="text" id="cName" class="form-control" required>
                  </div>
                  <div class="col-md-6 mb-3 form-group">
                      <label>Website</label>
                      <input type="url" id="cWeb" class="form-control">
                  </div>
                  <div class="col-md-6 mb-3 form-group">
                      <label>Location</label>
                      <input type="text" id="cLoc" class="form-control" required>
                  </div>
                  <div class="col-md-12 mb-3 form-group">
                      <label>Description</label>
                      <textarea id="cDesc" class="form-control" rows="3"></textarea>
                  </div>
              </div>
              <button type="submit" class="btn-submit">Create Company</button>
          </form>
      </div>

      <div id="dashboardTabs" style="display:none;">
          <ul class="nav-tabs d-flex list-unstyled">
              <li class="nav-item">
                  <a class="nav-link active" onclick="switchTab('myJobs', this)">My Jobs</a>
              </li>
              <li class="nav-item">
                  <a class="nav-link" onclick="switchTab('postJob', this)">Post a New Job</a>
              </li>
          </ul>

          <div id="myJobsTab" class="panel">
              <h2 class="panel-title">Posted Jobs</h2>
              <div id="myJobsList">Loading...</div>
          </div>

          <div id="postJobTab" class="panel" style="display:none;">
              <h2 class="panel-title">Post a New Job</h2>
              <form id="postJobForm">
                  <div class="row">
                      <div class="col-md-6 mb-3 form-group">
                          <label>Job Title</label>
                          <input type="text" id="jTitle" class="form-control" required>
                      </div>
                      <div class="col-md-6 mb-3 form-group">
                          <label>Location</label>
                          <input type="text" id="jLoc" class="form-control" placeholder="e.g. Remote, Bangalore" required>
                      </div>
                      <div class="col-md-6 mb-3 form-group">
                          <label>Salary / Annual Package</label>
                          <input type="text" id="jSal" class="form-control" placeholder="e.g. 5L - 8L / Year" required>
                      </div>
                      <div class="col-md-6 mb-3 form-group">
                          <label>Job Type</label>
                          <select id="jType" class="form-control">
                              <option value="Full Time">Full Time</option>
                              <option value="Part Time">Part Time</option>
                              <option value="Internship">Internship</option>
                          </select>
                      </div>
                      <div class="col-md-6 mb-3 form-group">
                          <label>Experience Level</label>
                          <input type="text" id="jExp" class="form-control" placeholder="e.g. 0-2 Years">
                      </div>
                      <div class="col-md-6 mb-3 form-group">
                          <label>Tags (Comma separated)</label>
                          <input type="text" id="jTags" class="form-control" placeholder="React, Node, Python">
                      </div>
                      <div class="col-md-12 mb-3 form-group">
                          <label>Description</label>
                          <textarea id="jDesc" class="form-control" rows="4"></textarea>
                      </div>
                      <div class="col-md-12 mb-3 form-group">
                          <label>Requirements</label>
                          <textarea id="jReq" class="form-control" rows="3"></textarea>
                      </div>
                  </div>
                  <button type="submit" class="btn-submit">Publish Job</button>
              </form>
          </div>
      </div>
      
      <!-- Applicants Modal/Panel -->
      <div id="applicantsPanel" class="panel" style="display:none; border: none; background: transparent; padding: 0;">
          <div class="d-flex justify-content-between align-items-center mb-4">
              <h2 class="panel-title m-0">Applicant Tracking System (ATS)</h2>
              <button class="btn btn-sm btn-outline-light" onclick="closeApplicants()"><i class="bi bi-arrow-left"></i> Back to Jobs</button>
          </div>
          <div class="kanban-board" id="kanbanBoard">
              <!-- Rendered via JS -->
          </div>
      </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
