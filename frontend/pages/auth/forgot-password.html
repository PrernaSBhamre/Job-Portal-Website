<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password | Tools and Job</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #09090b;
            --card: #0c0c0e;
            --border: #1d1d21;
            --violet: #8b5cf6;
            --violet-hover: #7c3aed;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
            --tp: #ffffff;
            --ts: #71717a;
        }

        body {
            background: var(--bg);
            color: var(--tp);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 0;
        }

        /* Deep Ambient Glows */
        .glow-1 { position: absolute; top: -15%; left: -10%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(139, 92, 246, 0.08), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); }
        .glow-2 { position: absolute; bottom: -20%; right: -5%; width: 800px; height: 800px; background: radial-gradient(circle, rgba(139, 92, 246, 0.05), transparent 70%); border-radius: 50%; z-index: -1; filter: blur(60px); }

        .auth-container {
            width: 100%;
            max-width: 460px;
            padding: 24px;
            z-index: 10;
        }

        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 48px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            animation: formFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--violet), transparent);
            opacity: 0.3;
        }

        @keyframes formFadeIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-box {
            display: flex; align-items: center; justify-content: center; gap: 16px;
            text-decoration: none; margin-bottom: 40px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: var(--violet);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 900; font-size: 1.5rem;
            transform: rotate(-4deg);
            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);
            transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .logo-box:hover .logo-icon { transform: rotate(0deg) scale(1.1); }
        .logo-text { font-weight: 800; font-size: 1.8rem; color: #fff; letter-spacing: -1px; }
        .logo-text span { color: var(--violet); }

        .auth-header { text-align: center; margin-bottom: 35px; }
        .auth-title { font-weight: 800; font-size: 1.8rem; margin-bottom: 10px; letter-spacing: -0.5px; }
        .auth-sub { color: var(--ts); font-size: 0.95rem; font-weight: 500; }

        .form-group { margin-bottom: 24px; position: relative; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--zinc-500); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i.prefix-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--zinc-500); font-size: 1.1rem; transition: 0.3s; pointer-events: none; }
        
        .form-control {
            width: 100%;
            background: #09090b;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 15px 15px 15px 52px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-control::placeholder { color: #3f3f46; }
        .form-control:focus {
            background: #111113;
            border-color: var(--violet);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            outline: none;
        }
        .form-control:focus ~ i.prefix-icon { color: var(--violet); }

        .btn-submit {
            width: 100%;
            background: var(--violet);
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 4px 0 0 #6d28d9;
        }
        .btn-submit:hover {
            background: var(--violet-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }
        .btn-submit:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 0 #6d28d9;
        }

        .auth-footer { text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--ts); font-weight: 500; }
        .auth-link { color: var(--violet); font-weight: 700; text-decoration: none; transition: 0.2s; }
        .auth-link:hover { color: #a78bfa; text-decoration: underline; }

        /* Return Home */
        .btn-home { position: absolute; top: 40px; left: 40px; color: var(--ts); text-decoration: none; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; z-index: 20; padding: 8px 16px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid transparent; }
        .btn-home:hover { color: #fff; background: rgba(255,255,255,0.08); border-color: var(--border); }

        #reqMessage { margin-top: 20px; transition: 0.3s; min-height: 24px; display: none; }
        .msg-container { display: flex; flex-direction: column; align-items: center; border-radius: 16px; padding: 20px; text-align: center; gap: 12px; }
        .msg-success { background: rgba(34, 197, 94, 0.05); border: 1px solid rgba(34, 197, 94, 0.2); color: #22c55e; }
        .msg-error { background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444; }

        @media (max-width: 480px) {
            .auth-card { padding: 32px 24px; border-radius: 24px; }
            .btn-home { top: 20px; left: 20px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <a href="../../index.html" class="btn-home"><i class="bi bi-arrow-left"></i> Back to Home</a>

    <div class="auth-container">
        <div class="auth-card">
            <a href="../../index.html" class="logo-box">
                <div class="logo-icon">T</div>
                <div class="logo-text">Tools<span>&Job</span></div>
            </a>

            <div class="auth-header">
                <h1 class="auth-title">Forgot Password?</h1>
                <p class="auth-sub">Enter your email and we'll send you a recovery link immediately.</p>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="reqEmail" class="form-control" placeholder="name@company.com" required>
                        <i class="bi bi-envelope prefix-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="subBtn">Send Recovery Link</button>
                <div id="reqMessage"></div>
            </form>

                Record remembered? <a href="login.html" class="auth-link">Login Here</a>
            </div>
        </div>
    </div>

    <!-- The Auth logic expects config.js -->
    <script src="../../js/config.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const msgBox = document.getElementById('reqMessage');
            
            btn.innerHTML = "<span class='spinner-border spinner-border-sm me-2'></span> Sending Link...";
            btn.disabled = true;
            msgBox.style.display = 'none';
            msgBox.className = '';

            const email = document.getElementById('reqEmail').value.trim();

            try {
                const response = await fetch(`${CONFIG.API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.className = 'msg-container msg-success';
                    msgBox.innerHTML = `
                        <i class="bi bi-envelope-check-fill" style="font-size: 2rem;"></i>
                        <div>
                            <div style="font-weight: 800; margin-bottom: 5px;">Recovery Link Sent!</div>
                            <div style="font-size: 0.85rem; opacity: 0.8;">A password reset link has been sent to your registered email address. Please check your inbox.</div>
                        </div>
                        <div style="margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; width: 100%;">
                            <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.6;">Mock System Note</div>
                            <div style="font-size: 0.8rem; color: #a78bfa;">Since we are using <b>Mock Mode</b>, the email link is logged to the backend console.</div>
                        </div>
                    `;
                    // Clear the form
                    document.getElementById('forgotForm').reset();
                } else {
                    msgBox.className = 'msg-container msg-error';
                    msgBox.innerHTML = `
                        <i class="bi bi-exclamation-octagon-fill" style="font-size: 1.5rem;"></i>
                        <div>
                            <div style="font-weight: 800;">Request Denied</div>
                            <div style="font-size: 0.85rem;">${data.message || 'Identity verification failed.'}</div>
                        </div>
                    `;
                    btn.disabled = false;
                    btn.innerHTML = 'Send Recovery Link';
                }
            } catch (error) {
                console.error('Password Reset Error:', error);
                msgBox.className = 'msg-container msg-error';
                msgBox.innerHTML = `
                    <i class="bi bi-wifi-off" style="font-size: 1.5rem;"></i>
                    <div>
                        <div style="font-weight: 800;">Network Failed</div>
                        <div style="font-size: 0.85rem;">Platform services unreachable.</div>
                    </div>
                `;
                btn.disabled = false;
                btn.innerHTML = 'Send Recovery Link';
            }
            
            msgBox.style.display = 'flex';
        });
    </script>
</body>
</html>
