<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FresherHub Premium - Sign Up</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0b14;
            --card: #13131f;
            --border: #2a2a42;
            --purple: #7c3aed;
            --orange: #f97316;
            --tp: #f0f0fa;
            --ts: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--tp);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 0;
        }

        /* Ambient Background Glows */
        .glow-1 { position: absolute; top: -10%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(124, 58, 237, 0.15), transparent 70%); border-radius: 50%; z-index: -1; }
        .glow-2 { position: absolute; bottom: -10%; right: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(249, 115, 22, 0.1), transparent 70%); border-radius: 50%; z-index: -1; }

        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            z-index: 10;
        }

        .auth-card {
            background: rgba(19, 19, 31, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: formFadeIn 0.6s ease-out forwards;
        }

        @keyframes formFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-decoration: none; margin-bottom: 30px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: var(--purple);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 1.3rem; font-family: 'Inter', sans-serif;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
        }
        .logo-text { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.6rem; color: #fff; letter-spacing: -0.5px; }
        .logo-text span { color: #a78bfa; }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 8px; }
        .auth-sub { color: var(--ts); font-size: 0.95rem; }

        /* Role Switcher */
        .role-switch {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .role-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--ts);
            transition: 0.3s;
        }
        .role-btn.active {
            background: var(--purple);
            color: #fff;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
        }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-label { display: block; font-size: 0.82rem; font-weight: 700; color: var(--ts); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 1.1rem; transition: 0.3s; }
        
        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 14px 14px 45px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--purple);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
            outline: none;
        }
        .form-control:focus + i { color: var(--purple); }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--orange), #fb923c);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }

        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.95rem; color: var(--ts); }
        .auth-link { color: var(--purple); font-weight: 700; text-decoration: none; transition: 0.2s; }
        .auth-link:hover { color: #a78bfa; text-decoration: underline; }

        /* Return Home */
        .btn-home { position: absolute; top: 30px; left: 30px; color: var(--ts); text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.95rem; transition: 0.3s; z-index: 20; }
        .btn-home:hover { color: #fff; }

        .social-btns { display: flex; gap: 15px; margin-top: 25px; }
        .social-btn { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: #fff; font-weight: 600; text-align: center; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; text-decoration: none;}
        .social-btn:hover { background: rgba(255,255,255,0.05); }

        .divider { text-align: center; color: var(--ts); font-size: 0.8rem; margin: 25px 0; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 30%; height: 1px; background: rgba(255,255,255,0.1); }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <a href="../../index.html" class="btn-home"><i class="bi bi-arrow-left"></i> Back to Home</a>

    <div class="auth-container">
        <div class="auth-card">
            <a href="../../index.html" class="logo-box">
                <div class="logo-icon">F</div>
                <div class="logo-text">Fresher<span>Hub</span></div>
            </a>

            <div class="auth-header">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-sub">Join thousands of tech talents and top employers.</p>
            </div>

            <div class="role-switch">
                <div class="role-btn active" id="fresherBtn">I'm a Fresher</div>
                <div class="role-btn" id="employerBtn">I'm an Employer</div>
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-icon-wrapper">
                        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                        <i class="bi bi-person"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrapper">
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <div class="input-icon-wrapper">
                        <input type="tel" id="phone" class="form-control" placeholder="+91 9876543210" required>
                        <i class="bi bi-telephone"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <i class="bi bi-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Sign Up</button>
            </form>

            <div class="divider">OR REGISTER WITH</div>

            <div class="social-btns">
                <button class="social-btn" id="githubBtn"><i class="bi bi-github"></i> GitHub</button>
                <button class="social-btn" id="linkedinBtn"><i class="bi bi-linkedin" style="color:#0a66c2;"></i> LinkedIn</button>
            </div>

            <div class="auth-footer">
                Already have an account? <a href="login.html" class="auth-link">Log In</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        const fresherBtn = document.getElementById("fresherBtn");
        const employerBtn = document.getElementById("employerBtn");
        let selectedRole = "student";

        fresherBtn.onclick = () => {
            fresherBtn.classList.add("active");
            employerBtn.classList.remove("active");
            selectedRole = "student";
        }

        employerBtn.onclick = () => {
            employerBtn.classList.add("active");
            fresherBtn.classList.remove("active");
            selectedRole = "recruiter";
        }

        document.getElementById("signupForm").addEventListener("submit", async function(e){
            e.preventDefault();

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let password = document.getElementById("password").value;

            if(name === "" || email === "" || phone === "" || password === ""){
                alert("Please fill all fields");
                return;
            }

            try {
                const response = await fetch(`${CONFIG.API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullname: name,
                        email: email,
                        phoneNumber: phone,
                        password: password,
                        role: selectedRole
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Account Created Successfully! 🚀\nPlease log in.");
                    window.location.href = "login.html";
                } else {
                    alert(`Registration Failed: ${data.message || 'Unknown error'}`);
                }
            } catch (error) {
                console.error("Error connecting to server:", error);
                alert("Registration Failed: Error connecting to server.");
            }
        });

        document.getElementById("githubBtn").onclick = (e) => {
            e.preventDefault();
            alert("Github Signup Coming Soon");
        }

        document.getElementById("linkedinBtn").onclick = (e) => {
            e.preventDefault();
            alert("LinkedIn Signup Coming Soon");
        }
    </script>
</body>
</html>
