<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin Dashboard – FresherHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0b14;
      --card: #181824;
      --border: #2a2a42;
      --purple: #6d28d9;
      --purple-light: #8b5cf6;
      --danger: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      background-position: center top;
    }

    /* Navbar styling */
    .navbar-wrapper {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(11, 11, 20, 0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .navbar-custom { padding: 22px 0; display: flex; align-items: center; justify-content: space-between; }
    .logo-box { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-icon { width: 36px; height: 36px; background: #5b21b6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 1.1rem; box-shadow: 0 0 15px rgba(91, 33, 182, 0.6); }
    .logo-text { font-weight: 700; font-size: 1.35rem; color: #fff; letter-spacing: -0.5px; }
    .logo-text span { color: #8b5cf6; }
    .nav-pill { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 40px; padding: 6px 8px; display: flex; gap: 5px; }
    .nav-pill a { color: #a1a1aa; text-decoration: none; font-size: 0.88rem; font-weight: 500; padding: 8px 20px; border-radius: 30px; transition: 0.3s; }
    .nav-pill a:hover, .nav-pill a.active { color: #fff; background: rgba(255, 255, 255, 0.08); }
    .auth-btns { display: flex; align-items: center; gap: 25px; }

    .dashboard-container { padding: 50px 0; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; }
    .panel-title { font-weight: 800; font-size: 1.5rem; margin-bottom: 20px; color: #fff; }

    .nav-tabs { border-bottom: 1px solid var(--border); margin-bottom: 25px; }
    .nav-tabs .nav-link { color: var(--text-muted); border: none; font-weight: 600; padding: 12px 25px; border-bottom: 2px solid transparent; cursor: pointer; }
    .nav-tabs .nav-link.active { color: var(--purple-light); background: transparent; border-bottom: 2px solid var(--purple-light); }

    .data-table { width: 100%; color: var(--text-main); border-collapse: separate; border-spacing: 0 10px; }
    .data-table th { padding: 0 15px 10px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 15px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .data-table tr td:first-child { border-left: 1px solid var(--border); border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
    .data-table tr td:last-child { border-right: 1px solid var(--border); border-top-right-radius: 10px; border-bottom-right-radius: 10px; text-align: right; }
    
    .btn-danger-outline { border: 1px solid var(--danger); color: var(--danger); background: transparent; padding: 6px 15px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
    .btn-danger-outline:hover { background: rgba(239, 68, 68, 0.1); }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar-wrapper">
    <div class="container">
      <nav class="navbar-custom">
        <a href="../../index.html" class="logo-box">
          <div class="logo-icon">F</div>
          <div class="logo-text">Fresher<span>Hub</span> <span class="badge bg-danger ms-2" style="font-size:0.6rem; vertical-align:middle;">ADMIN</span></div>
        </a>
        <div class="nav-pill d-none d-md-flex">
          <a href="../../index.html">Home</a>
          <a href="../jobs/jobs.html">Find Jobs</a>
          <a href="#" class="active mt-1">Admin Panel</a>
        </div>
        <div class="auth-btns">
          <!-- Auth logic will populate this -->
        </div>
      </nav>
    </div>
  </div>

  <div class="container dashboard-container">
      <ul class="nav-tabs d-flex list-unstyled">
          <li class="nav-item">
              <a class="nav-link active" onclick="switchTab('users', this)">Manage Users</a>
          </li>
          <li class="nav-item">
              <a class="nav-link" onclick="switchTab('jobs', this)">Manage Jobs</a>
          </li>
          <li class="nav-item">
              <a class="nav-link" onclick="switchTab('dashboard', this)">System Overview</a>
          </li>
      </ul>

      <div id="usersTab" class="panel">
          <h2 class="panel-title">Platform Users</h2>
          <table class="data-table">
              <thead>
                  <tr>
                      <th>Name</th>
                      <th>Email</th>
                      <th>Role</th>
                      <th>Actions</th>
                  </tr>
              </thead>
              <tbody id="usersList">
                  <tr><td colspan="4" class="text-center">Loading...</td></tr>
              </tbody>
          </table>
      </div>

      <div id="jobsTab" class="panel" style="display:none;">
          <h2 class="panel-title">Platform Jobs</h2>
          <table class="data-table">
              <thead>
                  <tr>
                      <th>Job Title</th>
                      <th>Company</th>
                      <th>Posted By</th>
                      <th>Actions</th>
                  </tr>
              </thead>
              <tbody id="jobsList">
                  <tr><td colspan="4" class="text-center">Loading...</td></tr>
              </tbody>
          </table>
      </div>

      <div id="dashboardTab" class="panel" style="display:none;">
          <h2 class="panel-title">System Overview</h2>
          <div class="row g-4 mt-2" id="statsRow">
             <div class="col-md-4">
                 <div class="p-4" style="background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 15px;">
                     <div class="text-muted fw-bold mb-1">TOTAL USERS</div>
                     <div class="fs-1 fw-black text-white" id="statUsers">0</div>
                 </div>
             </div>
             <div class="col-md-4">
                 <div class="p-4" style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 15px;">
                     <div class="text-muted fw-bold mb-1">TOTAL JOBS</div>
                     <div class="fs-1 fw-black text-white" id="statJobs">0</div>
                 </div>
             </div>
             <div class="col-md-4">
                 <div class="p-4" style="background: rgba(249, 115, 22, 0.1); border: 1px solid rgba(249, 115, 22, 0.3); border-radius: 15px;">
                     <div class="text-muted fw-bold mb-1">TOTAL APPLICATIONS</div>
                     <div class="fs-1 fw-black text-white" id="statApps">0</div>
                 </div>
             </div>
          </div>
      </div>
  </div>

  <script src="../../js/config.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
