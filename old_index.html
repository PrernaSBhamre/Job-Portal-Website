<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Period Job Portal - Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <div class="left-side">
        <div class="logo-box">
            <span class="logo-icon"><i class="bi bi-check-lg"></i></span>
            Freshers Hub
        </div>
        <img src="job.jpg" alt="Illustration" class="illustration-img">
    </div>

    <div class="right-side">
        <h2 class="portal-title">Login Job Portal</h2>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email ID</label>
                <input type="email" class="form-control" placeholder="john@notizjob.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" id="passwordField" class="form-control" placeholder="Password" required>
                    <span class="input-group-text" id="togglePassword">
                        <i class="bi bi-eye-slash" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <div class="links-row">
                <div>
                    <input type="checkbox" id="remember" class="form-check-input bg-dark border-secondary">
                    <label for="remember" style="cursor: pointer; margin-left: 5px;">Remember</label>
                </div>
                <a href="#">Forgot Password?</a>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login">Log In ≡ƒöÑ</button>
            </div>

            <div class="text-center mt-3" style="font-size: 0.8rem; color: #777;">
                Don't have an account? <a href="#" style="color: #ff00c8;">Create an account</a>
            </div>

            <div class="divider">
                <span>or sign in with</span>
            </div>

            <div class="social-btns">
                <button type="button" class="btn btn-social">
                    <i class="bi bi-linkedin" style="color: #0077b5;"></i> LinkedIn
                </button>
                <button type="button" class="btn btn-social">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="16"> Google
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#passwordField');
    const eyeIcon = document.querySelector('#eyeIcon');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        eyeIcon.classList.toggle('bi-eye');
        eyeIcon.classList.toggle('bi-eye-slash');
    });

    document.getElementById("loginForm").addEventListener("submit", function(e){
        e.preventDefault();
        const btn = document.querySelector(".btn-login");
        btn.innerHTML = "Authenticating... ΓÅ│";
        btn.disabled = true;
        
        setTimeout(() => {
            alert("Welcome Back to the Premium Portal! ≡ƒÜÇ");
            btn.innerHTML = "Log In ≡ƒöÑ";
            btn.disabled = false;
        }, 1500);
    });
</script>

</body>
</html>
