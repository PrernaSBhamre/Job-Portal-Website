<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password - FresherHub</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0b14;
            --card: #13131f;
            --border: #2a2a42;
            --purple: #7c3aed;
            --orange: #f97316;
            --tp: #f0f0fa;
            --ts: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--tp);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .glow-1 { position: absolute; top: -10%; left: -10%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(124, 58, 237, 0.15), transparent 70%); border-radius: 50%; z-index: -1; }
        .glow-2 { position: absolute; bottom: -20%; right: -10%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(249, 115, 22, 0.1), transparent 70%); border-radius: 50%; z-index: -1; }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            z-index: 10;
        }

        .auth-card {
            background: rgba(19, 19, 31, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: formFadeIn 0.6s ease-out forwards;
        }

        @keyframes formFadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo-box {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            text-decoration: none; margin-bottom: 30px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: var(--purple);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 800; font-size: 1.3rem;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.5);
        }
        .logo-text { font-weight: 800; font-size: 1.6rem; color: #fff; letter-spacing: -0.5px; }
        .logo-text span { color: #a78bfa; }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-title { font-weight: 800; font-size: 1.6rem; margin-bottom: 8px; }
        .auth-sub { color: var(--ts); font-size: 0.95rem; }

        .form-group { margin-bottom: 22px; position: relative; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 700; color: var(--ts); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .input-icon-wrapper { position: relative; }
        .input-icon-wrapper i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 1.1rem; transition: 0.3s; }
        
        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 14px 14px 45px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--purple);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
            outline: none;
        }
        .form-control:focus + i { color: var(--purple); }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--orange), #fb923c);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.3);
        }

        .auth-footer { text-align: center; margin-top: 25px; font-size: 0.95rem; color: var(--ts); }
        .auth-link { color: var(--purple); font-weight: 700; text-decoration: none; transition: 0.2s; }
        .auth-link:hover { color: #a78bfa; text-decoration: underline; }

        .btn-home { position: absolute; top: 30px; left: 30px; color: var(--ts); text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.95rem; transition: 0.3s; z-index: 20; }
        .btn-home:hover { color: #fff; }

        #reqMessage { margin-top: 20px; text-align: center; font-size: 0.9rem; font-weight: 600; padding: 15px; border-radius: 8px; display: none;}
        .success-box { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); color: #22c55e; }
        .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; }
    </style>
</head>
<body>

    <div class="glow-1"></div>
    <div class="glow-2"></div>

    <a href="../../index.html" class="btn-home"><i class="bi bi-arrow-left"></i> Back to Home</a>

    <div class="auth-container">
        <div class="auth-card">
            <a href="../../index.html" class="logo-box">
                <div class="logo-icon">F</div>
                <div class="logo-text">Fresher<span>Hub</span></div>
            </a>

            <div class="auth-header">
                <h1 class="auth-title">Forgot Password?</h1>
                <p class="auth-sub">Enter your email and we'll send you a cryptographic reset link immediately.</p>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrapper">
                        <input type="email" id="reqEmail" class="form-control" placeholder="name@example.com" required>
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="subBtn">Send Reset Link</button>
                <div id="reqMessage"></div>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="login.html" class="auth-link">Login here</a>
            </div>
        </div>
    </div>

    <!-- The Auth logic expects config.js -->
    <script src="../../js/config.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('subBtn');
            const msgBox = document.getElementById('reqMessage');
            
            btn.innerHTML = 'Sending...';
            btn.disabled = true;
            msgBox.style.display = 'none';
            msgBox.className = '';

            const email = document.getElementById('reqEmail').value.trim();

            try {
                const response = await fetch(`${CONFIG.API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    msgBox.classList.add('success-box');
                    // In a simulated environment, we show the mock developer link directly
                    msgBox.innerHTML = `<i class="bi bi-envelope-check-fill"></i> ${data.message} <br><br> <b>Developer Payload:</b> <br> <a class="auth-link" href="reset-password.html?token=${data.resetToken}">Click Here To Reset</a>`;
                } else {
                    msgBox.classList.add('error-box');
                    msgBox.innerHTML = `<i class="bi bi-exclamation-triangle-fill"></i> ${data.message || 'Verification failed.'}`;
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Password Reset Error:', error);
                msgBox.classList.add('error-box');
                msgBox.innerHTML = `<i class="bi bi-wifi-off"></i> Network Error. Plase try again.`;
                btn.disabled = false;
            }
            
            msgBox.style.display = 'block';
            if (btn.innerHTML === 'Sending...') btn.innerHTML = 'Send Reset Link';
        });
    </script>
</body>
</html>
