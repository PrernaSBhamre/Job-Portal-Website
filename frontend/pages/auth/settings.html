<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Tools and Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #09090b;
            --card: #0c0c0e;
            --border: #1d1d21;
            --violet: #8b5cf6;
            --violet-hover: #7c3aed;
            --zinc-400: #a1a1aa;
            --zinc-500: #71717a;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(139, 92, 246, 0.05), transparent 50%);
        }

        .navbar-wrapper {
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(16px);
        }

        .settings-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .settings-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .section-title {
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--zinc-500);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
        }

        .form-control {
            background: #09090b;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--violet);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.1);
            background: #111113;
            outline: none;
        }

        .btn-save {
            background: var(--violet);
            border: none;
            color: #fff;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .btn-save:hover {
            background: var(--violet-hover);
            transform: translateY(-2px);
        }

        .badge-verified {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        #alertBox {
            display: none;
            margin-bottom: 24px;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="navbar-wrapper">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="../../index.html" style="text-decoration: none;" class="d-flex align-items-center gap-2">
                <div style="background: var(--violet); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 900;">T</div>
                <div style="color: #fff; font-weight: 800; font-size: 1.2rem;">Tools<span>&Job</span></div>
            </a>
            <a href="#" id="backBtn" class="btn btn-sm btn-outline-secondary rounded-pill px-3">Back to Dashboard</a>
        </div>
    </div>

    <div class="settings-container">
        <div class="settings-card">
            <div id="alertBox"></div>

            <div class="d-flex justify-content-between align-items-center mb-5">
                <h2 class="section-title m-0"><i class="bi bi-gear-fill text-violet"></i> Security & Settings</h2>
                <span id="verifyBadge" class="badge-verified">Verified Account</span>
            </div>

            <form id="passwordForm">
                <h4 class="mb-4 text-white" style="font-weight: 700; font-size: 1.1rem;">Update Password</h4>
                <div class="row">
                    <div class="col-md-12 mb-4 form-group">
                        <label>Current Password</label>
                        <input type="password" id="oldPass" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-4 form-group">
                        <label>New Password</label>
                        <input type="password" id="newPass" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-4 form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPass" class="form-control" required>
                    </div>
                </div>
                <button type="submit" class="btn-save" id="passBtn">Synchronize Password</button>
            </form>

            <hr class="my-5" style="border-color: var(--border);">

            <div class="section-title"><i class="bi bi-shield-lock-fill text-violet"></i> Account Management</div>
            <p class="text-zinc-500 mb-4">Management of your identity and session tokens across the platform.</p>
            <div class="d-flex gap-3">
                <button class="btn btn-outline-danger rounded-pill px-4" onclick="logout()">De-authenticate Session</button>
            </div>
        </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="../../js/auth.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) window.location.href = 'login.html';

        // Set Back Link
        const backBtn = document.getElementById('backBtn');
        if (user.role === 'recruiter') backBtn.href = '../employer/dashboard.html';
        else backBtn.href = '../seeker/dashboard.html';

        // Set Verification Badge
        const verifyBadge = document.getElementById('verifyBadge');
        if (!user.isVerified) {
            verifyBadge.innerText = 'Unverified Identity';
            verifyBadge.style.color = '#ef4444';
            verifyBadge.style.background = 'rgba(239, 68, 68, 0.1)';
            verifyBadge.style.borderColor = 'rgba(239, 68, 68, 0.2)';
        }

        // Change Password Logic
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('passBtn');
            const alertBox = document.getElementById('alertBox');
            
            const oldPassword = document.getElementById('oldPass').value;
            const newPassword = document.getElementById('newPass').value;
            const confirmNewPassword = document.getElementById('confirmPass').value;

            if (newPassword !== confirmNewPassword) {
                showAlert('Passwords mismatch detected!', 'error');
                return;
            }

            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Syncing...';
            btn.disabled = true;

            try {
                const response = await fetch(`${CONFIG.API_URL}/auth/change-password`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ oldPassword, newPassword, confirmNewPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Success! Credentials updated.', 'success');
                    document.getElementById('passwordForm').reset();
                } else {
                    throw new Error(data.message || 'Verification failed');
                }
            } catch (err) {
                showAlert(err.message, 'error');
            } finally {
                btn.innerHTML = 'Synchronize Password';
                btn.disabled = false;
            }
        });

        function showAlert(msg, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.innerText = msg;
            alertBox.style.display = 'block';
            if (type === 'success') {
                alertBox.style.background = 'rgba(34, 197, 94, 0.1)';
                alertBox.style.color = '#22c55e';
                alertBox.style.border = '1px solid rgba(34, 197, 94, 0.2)';
            } else {
                alertBox.style.background = 'rgba(239, 68, 68, 0.1)';
                alertBox.style.color = '#ef4444';
                alertBox.style.border = '1px solid rgba(239, 68, 68, 0.2)';
            }
        }
    </script>
</body>
</html>
